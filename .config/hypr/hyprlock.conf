# KuroMiro Hyprlock
# Dev config only

$bg = $HOME/Projects/kurodots/wallpapers/lock.webp
$fg = rgba(cdd6f4ff)
$muted = rgba(6c7086ff)
$purple = rgba(cba6f7ff)
$pink = rgba(f5c2e7ff)
$red = rgba(f38ba8ff)
$surface = rgba(181825cc)
$surface_alt = rgba(1e1e2ecc)

general {
    disable_loading_bar = true
    hide_cursor = true
    no_fade_in = false
    grace = 0
}

background {
    monitor =
    path = $bg
    blur_passes = 3
    blur_size = 8
    noise = 0.0117
    contrast = 1.05
    brightness = 0.62
    vibrancy = 0.18
    vibrancy_darkness = 0.25
}

# Big time
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%I:%M")"
    color = $fg
    font_size = 82
    font_family = JetBrainsMono Nerd Font ExtraBold
    position = 0, 150
    halign = center
    valign = center
}

# AM/PM
label {
    monitor =
    text = cmd[update:1000] echo "$(date +"%p")"
    color = $pink
    font_size = 22
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, 75
    halign = center
    valign = center
}

# Date
label {
    monitor =
    text = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color = $muted
    font_size = 18
    font_family = JetBrainsMono Nerd Font
    position = 0, 38
    halign = center
    valign = center
}

# Greeting
label {
    monitor =
    text = Welcome back, Kason
    color = $fg
    font_size = 18
    font_family = JetBrainsMono Nerd Font Bold
    position = 0, -25
    halign = center
    valign = center
}

# Password box
input-field {
    monitor =
    size = 360, 62
    outline_thickness = 2

    dots_size = 0.26
    dots_spacing = 0.25
    dots_center = true

    outer_color = rgba(cba6f755)
    inner_color = $surface
    font_color = $fg

    fade_on_empty = false
    placeholder_text = <span foreground="##6c7086">Enter password...</span>

    check_color = rgba(89b4faff)
    fail_color = rgba(f38ba8ff)

    rounding = 20
    shadow_passes = 3
    shadow_size = 8
    shadow_color = rgba(00000066)

    position = 0, -105
    halign = center
    valign = center
}

# Bottom hint
label {
    monitor =
    text = locked with KuroMiro
    color = $muted
    font_size = 12
    font_family = JetBrainsMono Nerd Font
    position = 0, 35
    halign = center
    valign = bottom
}
