# ============================================================
# KuroMiro Hyprland Config
# Dev config only
# Path: ~/Projects/kurodots/.config/hypr/hyprland.conf
# ============================================================

# ----------------------------
# Variables
# ----------------------------

$mod = SUPER

$terminal = kitty --config ~/Projects/kurodots/.config/kitty/kitty.conf
$launcher = rofi -show drun -config ~/Projects/kurodots/.config/rofi/config.rasi
$fileManager = dolphin
$browser = firefox

$wallRandom = ~/Projects/kurodots/.local/bin/kuro-wall
$wallPicker = ~/Projects/kurodots/.local/bin/kuro-wallpick
$lock = hyprlock --config ~/Projects/kurodots/.config/hypr/hyprlock.conf

# ----------------------------
# Monitor
# ----------------------------

monitor=,preferred,auto,1

# ----------------------------
# Startup
# ----------------------------

exec-once = waybar -c ~/Projects/kurodots/.config/waybar/config.jsonc -s ~/Projects/kurodots/.config/waybar/style.css
exec-once = swaync -c ~/Projects/kurodots/.config/swaync/config.json -s ~/Projects/kurodots/.config/swaync/style.css
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store
exec-once = /usr/lib/polkit-kde-authentication-agent-1

# Wallpaper startup is disabled for now so it does not surprise-change your current wallpaper.
# exec-once = $wallRandom

# ----------------------------
# Environment
# ----------------------------

env = XCURSOR_SIZE,24
env = HYPRCURSOR_SIZE,24
env = QT_QPA_PLATFORMTHEME,qt6ct

# ----------------------------
# Input
# ----------------------------

input {
    kb_layout = us
    follow_mouse = 1
    sensitivity = 0

    touchpad {
        natural_scroll = yes
        tap-to-click = yes
        disable_while_typing = yes
    }
}

gestures {
    workspace_swipe = true
    workspace_swipe_fingers = 3
    workspace_swipe_distance = 300
}

# ----------------------------
# General Look
# ----------------------------

general {
    gaps_in = 6
    gaps_out = 14
    border_size = 2

    col.active_border = rgba(cba6f7ff) rgba(f5c2e7ff) 45deg
    col.inactive_border = rgba(313244aa)

    resize_on_border = true
    allow_tearing = false
    layout = dwindle
}

# ----------------------------
# Decoration
# ----------------------------

decoration {
    rounding = 18

    blur {
        enabled = true
        size = 8
        passes = 3
        vibrancy = 0.18
        ignore_opacity = true
    }

    shadow {
        enabled = true
        range = 22
        render_power = 3
        color = rgba(00000066)
    }
}

# ----------------------------
# Animations
# ----------------------------

animations {
    enabled = true

    bezier = kuro, 0.05, 0.9, 0.1, 1.05
    bezier = smooth, 0.25, 0.1, 0.25, 1.0

    animation = windows, 1, 6, kuro
    animation = windowsOut, 1, 5, default, popin 80%
    animation = border, 1, 8, smooth
    animation = borderangle, 1, 8, smooth
    animation = fade, 1, 6, smooth
    animation = workspaces, 1, 6, kuro
}

# ----------------------------
# Layout
# ----------------------------

dwindle {
    pseudotile = true
    preserve_split = true
    smart_split = false
    smart_resizing = true
}

master {
    new_status = master
}

# ----------------------------
# Misc
# ----------------------------

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    force_default_wallpaper = 0
    vfr = true
    animate_manual_resizes = true
    animate_mouse_windowdragging = true
}

# ----------------------------
# Main Keybinds
# ----------------------------

bind = $mod, RETURN, exec, $terminal
bind = $mod, D, exec, $launcher
bind = $mod, E, exec, $fileManager
bind = $mod, B, exec, $browser

bind = $mod, Q, killactive
bind = $mod SHIFT, Q, exit
bind = $mod, F, fullscreen
bind = $mod, V, togglefloating
bind = $mod, P, pseudo
bind = $mod, J, togglesplit

bind = $mod, L, exec, $lock

# ----------------------------
# Rice Keybinds
# ----------------------------

bind = $mod SHIFT, W, exec, $wallRandom
bind = $mod, W, exec, $wallPicker
bind = $mod, N, exec, swaync-client -t

# ----------------------------
# Screenshots
# ----------------------------

bind = , PRINT, exec, grim -g "$(slurp)" - | swappy -f -
bind = $mod, PRINT, exec, grim ~/Pictures/Screenshots/screenshot-$(date +%Y-%m-%d-%H-%M-%S).png

# ----------------------------
# Clipboard
# ----------------------------

bind = $mod, C, exec, cliphist list | rofi -dmenu -i -p "Clipboard" -config ~/Projects/kurodots/.config/rofi/config.rasi | cliphist decode | wl-copy

# ----------------------------
# Audio
# ----------------------------

bind = , XF86AudioRaiseVolume, exec, pamixer -i 5
bind = , XF86AudioLowerVolume, exec, pamixer -d 5
bind = , XF86AudioMute, exec, pamixer -t
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# ----------------------------
# Brightness
# ----------------------------

bind = , XF86MonBrightnessUp, exec, brightnessctl set +5%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 5%-

# ----------------------------
# Move Focus
# ----------------------------

bind = $mod, left, movefocus, l
bind = $mod, right, movefocus, r
bind = $mod, up, movefocus, u
bind = $mod, down, movefocus, d

bind = $mod, H, movefocus, l
bind = $mod, SEMICOLON, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# ----------------------------
# Move Windows
# ----------------------------

bind = $mod SHIFT, left, movewindow, l
bind = $mod SHIFT, right, movewindow, r
bind = $mod SHIFT, up, movewindow, u
bind = $mod SHIFT, down, movewindow, d

bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, SEMICOLON, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# ----------------------------
# Resize Windows
# ----------------------------

binde = $mod CTRL, right, resizeactive, 30 0
binde = $mod CTRL, left, resizeactive, -30 0
binde = $mod CTRL, up, resizeactive, 0 -30
binde = $mod CTRL, down, resizeactive, 0 30

# ----------------------------
# Workspaces
# ----------------------------

bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod, 6, workspace, 6
bind = $mod, 7, workspace, 7
bind = $mod, 8, workspace, 8
bind = $mod, 9, workspace, 9
bind = $mod, 0, workspace, 10

bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5
bind = $mod SHIFT, 6, movetoworkspace, 6
bind = $mod SHIFT, 7, movetoworkspace, 7
bind = $mod SHIFT, 8, movetoworkspace, 8
bind = $mod SHIFT, 9, movetoworkspace, 9
bind = $mod SHIFT, 0, movetoworkspace, 10

bind = $mod, mouse_down, workspace, e+1
bind = $mod, mouse_up, workspace, e-1

# ----------------------------
# Mouse
# ----------------------------

bindm = $mod, mouse:272, movewindow
bindm = $mod, mouse:273, resizewindow

# ----------------------------
# Window Rules
# ----------------------------

windowrulev2 = float,class:^(pavucontrol)$
windowrulev2 = size 850 600,class:^(pavucontrol)$
windowrulev2 = center,class:^(pavucontrol)$

windowrulev2 = float,class:^(nwg-look)$
windowrulev2 = center,class:^(nwg-look)$

windowrulev2 = float,class:^(blueman-manager)$
windowrulev2 = center,class:^(blueman-manager)$

windowrulev2 = float,title:^(Picture-in-Picture)$
windowrulev2 = pin,title:^(Picture-in-Picture)$
windowrulev2 = size 420 236,title:^(Picture-in-Picture)$
windowrulev2 = move 100%-440 100%-260,title:^(Picture-in-Picture)$

windowrulev2 = opacity 0.92 0.90,class:^(kitty)$
windowrulev2 = opacity 0.96 0.94,class:^(Code)$
windowrulev2 = opacity 0.96 0.94,class:^(code-url-handler)$

# ---------------------------
# Kuro Profile
# ----------------------------

windowrulev2 = float,class:^(kuro-profile)$
windowrulev2 = center,class:^(kuro-profile)$
windowrulev2 = size 1100 720,class:^(kuro-profile)$
windowrulev2 = noborder,class:^(kuro-profile)$
windowrulev2 = rounding 22,class:^(kuro-profile)$
windowrulev2 = stayfocused,class:^(kuro-profile)$

# ----------------------------
# Layer Rules
# ----------------------------

layerrule = blur, waybar
layerrule = blur, rofi
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, waybar
layerrule = ignorezero, rofi

# Kuro Audio
windowrule = match:title ^Kuro Audio$, float on
windowrule = match:title ^Kuro Audio$, center on
windowrule = match:title ^Kuro Audio$, size 720 650
windowrule = match:title ^Kuro Audio$, noborder on
windowrule = match:title ^Kuro Audio$, rounding 24
windowrule = match:title ^Kuro Audio$, stayfocused on
