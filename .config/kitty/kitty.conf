# KuroMiro Kitty Theme
# Safe dev config only

font_family JetBrainsMono Nerd Font
bold_font auto
italic_font auto
bold_italic_font auto

font_size 11.5

disable_ligatures never

cursor_shape beam
cursor_blink_interval 0.5

window_padding_width 14
background_opacity 0.78
dynamic_background_opacity yes

confirm_os_window_close 0

tab_bar_edge top
tab_bar_style powerline
tab_powerline_style slanted
tab_title_template "{title}"
active_tab_font_style bold
inactive_tab_font_style normal

# Main colors
foreground #cdd6f4
background #181825
selection_foreground #181825
selection_background #cba6f7

# Cursor
cursor #f5c2e7
cursor_text_color #181825

# URL
url_color #89b4fa

# Border bell
visual_bell_duration 0.08
bell_border_color #f38ba8

# Black
color0 #45475a
color8 #585b70

# Red
color1 #f38ba8
color9 #f38ba8

# Green
color2 #a6e3a1
color10 #a6e3a1

# Yellow
color3 #f9e2af
color11 #f9e2af

# Blue
color4 #89b4fa
color12 #89b4fa

# Magenta
color5 #cba6f7
color13 #f5c2e7

# Cyan
color6 #94e2d5
color14 #94e2d5

# White
color7 #bac2de
color15 #a6adc8

# Tab colors
active_tab_foreground #181825
active_tab_background #cba6f7
inactive_tab_foreground #cdd6f4
inactive_tab_background #313244
tab_bar_background #11111b

# Window layout
enabled_layouts tall,stack,splits

# Scrollback
scrollback_lines 10000

# Mouse
copy_on_select clipboard
strip_trailing_spaces smart
open_url_with default

# Useful shortcuts
map ctrl+shift+enter new_window
map ctrl+shift+t new_tab
map ctrl+shift+w close_tab
map ctrl+shift+right next_tab
map ctrl+shift+left previous_tab
map ctrl+shift+plus change_font_size all +1.0
map ctrl+shift+minus change_font_size all -1.0
map ctrl+shift+backspace change_font_size all 0
